name: Build and Deploy (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'OPTIONAL: Specify an existing image tag to re-deploy.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.get_tag.outputs.tag }}
      build_needed: ${{ steps.get_tag.outputs.build_needed }}
    steps:
      - name: Determine image tag
        id: get_tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.build_needed == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ghcr.io/almonium-platform/almonium-fe:${{ needs.setup.outputs.image_tag }}
          build-args: |
            BUILD_CONFIGURATION=production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [ setup, build ]
    if: always() && needs.setup.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment: prod
    steps:
      - name: Checkout almonium-infra repository
        uses: actions/checkout@v5
        with:
          repository: almonium-platform/almonium-infra
          path: almonium-infra
          ssh-key: ${{ secrets.INFRA_REPO_CHECKOUT_KEY }}

      - name: Run Ansible Playbook
        uses: dawidd6/action-ansible-playbook@v4
        with:
          playbook: playbook-deploy-almonium-fe.yaml
          directory: almonium-infra/ansible
          key: ${{ secrets.CLOUD_KEY }}
          options: |
            -i inventory/hosts.ini
            --limit almonium
            --extra-vars "deploy_environment=prod"
            --extra-vars "deploy_image_tag=${{ needs.setup.outputs.image_tag }}"
            --extra-vars "deploy_gh_actor=${{ github.actor }}"
            --extra-vars "deploy_gh_token=${{ secrets.GITHUB_TOKEN }}"
